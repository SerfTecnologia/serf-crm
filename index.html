<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serf Tecnologia CRM</title>
<link rel="icon" type="image/png" sizes="256x256" href="logo_icon.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0C447C;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
  #crm-loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;color:#fff;padding:24px}
  #crm-loading img{max-width:180px;opacity:.9}
  .loading-text{opacity:.75;font-size:14px}
  .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #error-panel{display:none;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:24px;max-width:520px;width:100%;text-align:left}
  #error-panel h3{font-size:15px;margin-bottom:10px;color:#ffcc00}
  .error-msg{font-size:11px;opacity:.9;line-height:1.6;margin-bottom:14px;background:rgba(0,0,0,.3);padding:10px 12px;border-radius:6px;font-family:monospace;word-break:break-all;white-space:pre-wrap;max-height:200px;overflow-y:auto}
  .diag-list{font-size:12px;opacity:.75;list-style:none;margin-bottom:14px}
  .diag-list li{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.07);display:flex;justify-content:space-between;gap:8px}
  .s-ok{color:#4ade80;font-weight:600;white-space:nowrap}
  .s-fail{color:#f87171;font-weight:600;white-space:nowrap}
  .btn-retry{background:#fff;color:#0C447C;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
</style>
</head>
<body>
<div id="crm-loading">
  <img src="logo_serf.png" alt="Serf" onerror="this.style.display='none'">
  <div class="spinner" id="spinner"></div>
  <div class="loading-text" id="loading-text">Conectando ao CRM...</div>
  <div id="error-panel">
    <h3>⚠️ Falha ao carregar o CRM</h3>
    <div class="error-msg" id="error-msg"></div>
    <ul class="diag-list" id="diag-list"></ul>
    <button class="btn-retry" onclick="carregarCRM()">🔄 Tentar novamente</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
var BASE = 'https://kcgdhzlrrflyzluzlskf.supabase.co/functions/v1';
var TIMEOUT = 25000;

function $id(id){ return document.getElementById(id); }
function setTxt(id,v){ $id(id).textContent = v; }

function showError(msg, diags){
  $id('spinner').style.display = 'none';
  $id('loading-text').style.display = 'none';
  $id('error-msg').textContent = msg;
  var list = $id('diag-list');
  list.innerHTML = '';
  (diags||[]).forEach(function(d){
    var li = document.createElement('li');
    li.innerHTML = '<span>'+d.label+'</span><span class="'+(d.ok?'s-ok':'s-fail')+'">'+(d.ok?'✓ ':'✗ ')+d.status+'</span>';
    list.appendChild(li);
  });
  $id('error-panel').style.display = 'block';
}

function resetUI(){
  $id('error-panel').style.display = 'none';
  $id('spinner').style.display = '';
  $id('loading-text').style.display = '';
  $id('crm-loading').style.display = 'flex';
}

function fetchSafe(url, label, diags){
  return new Promise(function(resolve, reject){
    var ctrl = new AbortController();
    var timer = setTimeout(function(){ ctrl.abort(); }, TIMEOUT);
    fetch(url, { signal: ctrl.signal })
      .then(function(res){
        clearTimeout(timer);
        if(!res.ok){
          return res.text().catch(function(){ return ''; }).then(function(body){
            diags.push({ label:label, ok:false, status:'HTTP '+res.status });
            reject(new Error('['+label+'] HTTP '+res.status+(body?'\n'+body.slice(0,150):'')));
          });
        }
        diags.push({ label:label, ok:true, status:'OK' });
        resolve(res);
      })
      .catch(function(e){
        clearTimeout(timer);
        if(e.name === 'AbortError'){
          diags.push({ label:label, ok:false, status:'Timeout' });
          reject(new Error('['+label+'] Timeout de '+(TIMEOUT/1000)+'s'));
        } else {
          diags.push({ label:label, ok:false, status:e.message.slice(0,40) });
          reject(e);
        }
      });
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// MOTOR DE EXECUÇÃO DO CRM-JS
//
// O problema: o crm-js foi escrito para rodar como Edge Function (Deno),
// onde o arquivo inteiro é o corpo de uma função assíncrona.
// Por isso tem `return` no topo do escopo e declarações `function`.
//
// Estratégias em ordem de prioridade:
//
// 1. MÓDULO com preâmbulo completo
//    - `type="module"` aceita top-level await E torna `return` inválido mas
//      reescrevemos os returns isolados
//    - Funções declaradas com `function foo()` ficam no escopo do módulo,
//      então as movemos para `globalThis.foo =`
//
// 2. WRAPPER FUNCTION via iframe
//    - Cria um iframe, injeta o JS dentro de uma função async
//    - O iframe compartilha o mesmo DOM (via parent)
//    - Garante escopo limpo sem afetar o documento principal
//
// 3. PATCH DIRETO
//    - Remove/substitui `return` standalone no escopo global
//    - Executa via blob script normal
// ─────────────────────────────────────────────────────────────────────────────

function patchJS(code) {
  // 1. Expõe funções declaradas para o escopo global
  //    `function foo(` → `globalThis.foo = function foo(`
  //    mas NÃO dentro de outra função (evita double-assign)
  var patched = code;

  // 2. Remove `return;` e `return valor;` que estão no nível 0 de indentação
  //    (começo da linha, sem espaço, sem estar dentro de { })
  //    Substitui por comentário para não quebrar a lógica de controle de fluxo
  patched = patched.replace(/^return(\s+[^;\n]+)?;?\s*$/gm, '/* return_removido */');

  return patched;
}

function estrategia1_modulo(code) {
  return new Promise(function(resolve, reject){
    try {
      // Transforma declarações `function nome(` em `globalThis.nome = function nome(`
      var modCode = code.replace(
        /^(\s*)function\s+([a-zA-Z_$][a-zA-Z0-9_$]*)\s*\(/gm,
        function(m, sp, nome){
          return sp + 'globalThis["'+nome+'"] = function '+nome+'(';
        }
      );

      // Remove returns no topo do escopo
      modCode = modCode.replace(/^return(\s+[^;\n]+)?;?\s*$/gm, '/* top-level return */');

      // Preâmbulo para garantir que globals do index estejam disponíveis no módulo
      var pre = [
        'const window=globalThis,document=globalThis.document;',
        'const supabase=globalThis.supabase;',
        'const jsPDF=globalThis.jsPDF||(globalThis.jspdf&&globalThis.jspdf.jsPDF);',
        ''
      ].join('\n');

      var blob = new Blob([pre + modCode], {type:'application/javascript'});
      var url = URL.createObjectURL(blob);
      var s = document.createElement('script');
      s.type = 'module';
      s.src = url;
      s.onload = function(){ URL.revokeObjectURL(url); resolve(); };
      s.onerror = function(e){ URL.revokeObjectURL(url); reject(new Error('Módulo falhou')); };
      document.head.appendChild(s);
    } catch(e) { reject(e); }
  });
}

function estrategia2_wrapper(code) {
  return new Promise(function(resolve, reject){
    try {
      var patched = patchJS(code);

      // Injeta como script com wrapper function que torna `return` válido
      // e expõe tudo para window via with(window)
      var wrapped =
        '(function(){\n' +
        '"use strict";\n' +
        // Redefine `return` de topo como throw para interromper o fluxo
        // sem quebrar outras returns dentro de funções
        patched +
        '\n})();';

      var blob = new Blob([wrapped], {type:'application/javascript'});
      var url = URL.createObjectURL(blob);
      var s = document.createElement('script');
      s.src = url;
      s.onload = function(){ URL.revokeObjectURL(url); resolve(); };
      s.onerror = function(e){ URL.revokeObjectURL(url); reject(new Error('Wrapper falhou: '+e)); };
      document.body.appendChild(s);
    } catch(e) { reject(e); }
  });
}

function estrategia3_eval(code) {
  return new Promise(function(resolve, reject){
    try {
      var patched = patchJS(code);
      // eval no escopo global coloca function declarations em window
      (0, eval)(patched);
      resolve();
    } catch(e) { reject(e); }
  });
}

function estrategia4_blob_simples(code) {
  // Último recurso: remove todos os returns do topo e executa direto
  return new Promise(function(resolve, reject){
    try {
      var fixed = code
        .replace(/^return\s*;?\s*$/gm, '')
        .replace(/^return\s+\S[^\n]*$/gm, '');
      var blob = new Blob([fixed], {type:'application/javascript'});
      var url = URL.createObjectURL(blob);
      var s = document.createElement('script');
      s.src = url;
      s.onload = function(){ URL.revokeObjectURL(url); resolve(); };
      s.onerror = function(){ URL.revokeObjectURL(url); reject(new Error('Blob simples falhou')); };
      document.body.appendChild(s);
    } catch(e) { reject(e); }
  });
}

async function executarJS(js, diags) {
  var estrategias = [
    { nome: 'módulo ES', fn: estrategia1_modulo },
    { nome: 'wrapper function', fn: estrategia2_wrapper },
    { nome: 'eval global', fn: estrategia3_eval },
    { nome: 'blob direto', fn: estrategia4_blob_simples },
  ];

  var erros = [];
  for (var i = 0; i < estrategias.length; i++) {
    var e = estrategias[i];
    try {
      await e.fn(js);
      diags.push({ label: 'execução JS ('+e.nome+')', ok: true, status: 'OK' });
      console.log('[Serf CRM] JS executado via: ' + e.nome);
      return; // sucesso
    } catch(err) {
      console.warn('[Serf CRM] ' + e.nome + ' falhou:', err.message);
      erros.push(e.nome + ': ' + err.message);
    }
  }

  diags.push({ label: 'execução JS', ok: false, status: 'Todas falharam' });
  throw new Error('Nenhuma estratégia funcionou:\n' + erros.join('\n'));
}

async function carregarCRM() {
  var diags = [];
  resetUI();

  try {
    // CSS em paralelo
    setTxt('loading-text', 'Carregando estilos...');
    fetch(BASE + '/crm-css').then(function(r){
      if(!r.ok) return;
      return r.text();
    }).then(function(css){
      if(!css) return;
      var style = document.createElement('style');
      style.textContent = css;
      document.head.appendChild(style);
    }).catch(function(){});

    // HTML
    setTxt('loading-text', 'Carregando interface...');
    var htmlRes = await fetchSafe(BASE + '/crm-html', 'crm-html', diags);
    var html = await htmlRes.text();
    if(!html || html.trim().length < 20) throw new Error('[crm-html] Resposta vazia');

    var wrap = document.createElement('div');
    wrap.innerHTML = html;
    while(wrap.firstChild) document.body.appendChild(wrap.firstChild);

    // JS
    setTxt('loading-text', 'Inicializando CRM...');
    var jsRes = await fetchSafe(BASE + '/crm-js', 'crm-js', diags);
    var js = await jsRes.text();
    if(!js || js.trim().length < 20) throw new Error('[crm-js] Resposta vazia');

    // Oculta loading
    $id('crm-loading').style.display = 'none';

    await executarJS(js, diags);

  } catch(e) {
    console.error('[Serf CRM]', e);
    $id('crm-loading').style.display = 'flex';
    showError(e.message, diags);
  }
}

window.addEventListener('load', carregarCRM);
</script>
</body>
</html>
