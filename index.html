<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serf Tecnologia CRM</title>
<link rel="icon" type="image/png" sizes="256x256" href="logo_icon.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0C447C;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
  #crm-loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;color:#fff;padding:24px}
  #crm-loading img{max-width:180px;opacity:.9}
  .loading-text{opacity:.75;font-size:14px}
  .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #error-panel{display:none;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:24px;max-width:520px;width:100%;text-align:left}
  #error-panel h3{font-size:15px;margin-bottom:10px;color:#ffcc00}
  .error-msg{font-size:11px;line-height:1.6;margin-bottom:14px;background:rgba(0,0,0,.3);padding:10px 12px;border-radius:6px;font-family:monospace;word-break:break-all;white-space:pre-wrap;max-height:200px;overflow-y:auto}
  .diag-list{font-size:12px;opacity:.75;list-style:none;margin-bottom:14px}
  .diag-list li{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.07);display:flex;justify-content:space-between;gap:8px}
  .s-ok{color:#4ade80;font-weight:600}
  .s-fail{color:#f87171;font-weight:600}
  .btn-retry{background:#fff;color:#0C447C;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
</style>
</head>
<body>

<div id="crm-loading">
  <img src="logo_serf.png" alt="Serf Tecnologia" onerror="this.style.display='none'">
  <div class="spinner" id="spinner"></div>
  <div class="loading-text" id="loading-text">Conectando ao CRM...</div>
  <div id="error-panel">
    <h3>⚠️ Falha ao carregar o CRM</h3>
    <div class="error-msg" id="error-msg"></div>
    <ul class="diag-list" id="diag-list"></ul>
    <button class="btn-retry" onclick="carregarCRM()">🔄 Tentar novamente</button>
  </div>
</div>

<!--
  ORDEM CRÍTICA:
  1. Supabase SDK  → define window.supabase
  2. jsPDF         → define window.jspdf / window.jsPDF
  3. Nosso loader  → busca crm-css, crm-html, crm-js e executa na ordem certa
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
var BASE    = 'https://kcgdhzlrrflyzluzlskf.supabase.co/functions/v1';
var TIMEOUT = 20000;

function $id(id){ return document.getElementById(id); }
function setTxt(id,v){ $id(id).textContent = v; }

function showError(msg, diags){
  $id('spinner').style.display = 'none';
  $id('loading-text').style.display = 'none';
  $id('error-msg').textContent = msg;
  var list = $id('diag-list');
  list.innerHTML = '';
  (diags||[]).forEach(function(d){
    var li = document.createElement('li');
    li.innerHTML = '<span>'+d.label+'</span><span class="'+(d.ok?'s-ok':'s-fail')+'">'+(d.ok?'✓ ':'✗ ')+d.status+'</span>';
    list.appendChild(li);
  });
  $id('error-panel').style.display = 'block';
}

function resetUI(){
  $id('error-panel').style.display  = 'none';
  $id('spinner').style.display      = '';
  $id('loading-text').style.display = '';
  $id('crm-loading').style.display  = 'flex';
}

function fetchTexto(url, label, diags){
  return new Promise(function(resolve, reject){
    var ctrl  = new AbortController();
    var timer = setTimeout(function(){ ctrl.abort(); }, TIMEOUT);
    fetch(url, { signal: ctrl.signal })
      .then(function(res){
        clearTimeout(timer);
        if(!res.ok){
          return res.text().catch(function(){ return ''; }).then(function(body){
            diags.push({ label:label, ok:false, status:'HTTP '+res.status });
            reject(new Error('['+label+'] HTTP '+res.status+(body?': '+body.slice(0,100):'')));
          });
        }
        diags.push({ label:label, ok:true, status:'OK' });
        return res.text();
      })
      .then(function(text){ if(text !== undefined) resolve(text); })
      .catch(function(e){
        clearTimeout(timer);
        if(e.name==='AbortError'){
          diags.push({ label:label, ok:false, status:'Timeout' });
          reject(new Error('['+label+'] Timeout de '+(TIMEOUT/1000)+'s'));
        } else {
          if(!diags.find(function(d){ return d.label===label; }))
            diags.push({ label:label, ok:false, status:e.message.slice(0,40) });
          reject(e);
        }
      });
  });
}

// Injeta script via Blob e aguarda onload
function injectScript(code, tipo){
  return new Promise(function(resolve, reject){
    var blob   = new Blob([code], {type:'application/javascript'});
    var url    = URL.createObjectURL(blob);
    var s      = document.createElement('script');
    if(tipo) s.type = tipo;
    s.src = url;
    s.onload  = function(){ URL.revokeObjectURL(url); resolve(); };
    s.onerror = function(e){ URL.revokeObjectURL(url); reject(new Error('Erro ao executar script')); };
    document.body.appendChild(s);
  });
}

async function carregarCRM(){
  var diags = [];
  resetUI();

  try {

    // ── 1. CSS (paralelo, não bloqueia) ──────────────────────────────────────
    setTxt('loading-text', 'Carregando estilos...');
    fetch(BASE+'/crm-css')
      .then(function(r){ return r.ok ? r.text() : null; })
      .then(function(css){
        if(!css) return;
        var el = document.createElement('style');
        el.textContent = css;
        document.head.appendChild(el);
      })
      .catch(function(){});

    // ── 2. HTML ───────────────────────────────────────────────────────────────
    setTxt('loading-text', 'Carregando interface...');
    var html = await fetchTexto(BASE+'/crm-html', 'crm-html', diags);
    if(!html || html.trim().length < 20) throw new Error('[crm-html] Resposta vazia');

    var wrap = document.createElement('div');
    wrap.innerHTML = html;
    while(wrap.firstChild) document.body.appendChild(wrap.firstChild);

    // ── 3. JS ─────────────────────────────────────────────────────────────────
    // O crm-js usa `supabase.createClient(...)` no topo do arquivo.
    // Para que isso funcione, o SDK do Supabase (já carregado acima como script
    // síncrono) precisa estar exposto como `supabase` no escopo global.
    //
    // window.supabase já é definido pelo SDK como o objeto do módulo inteiro.
    // O crm-js chama `supabase.createClient(...)` — isso funciona direto.
    //
    // Executamos o JS como script normal (não módulo) via Blob URL para que:
    //   • Declarações `function foo()` fiquem globais (acessíveis como window.foo)
    //   • `const sb = supabase.createClient(...)` encontre window.supabase
    //   • `await` dentro de async functions funcione normalmente
    //
    setTxt('loading-text', 'Inicializando CRM...');
    var js = await fetchTexto(BASE+'/crm-js', 'crm-js', diags);
    if(!js || js.trim().length < 20) throw new Error('[crm-js] Resposta vazia');

    // Esconde loading antes de executar (o JS vai mostrar a tela de login)
    $id('crm-loading').style.display = 'none';

    // Executa como script clássico — sem `type="module"` — para manter
    // declarações de função no escopo global
    await injectScript(js);

    // Chama init() se existir (o crm-js provavelmente define e chama init())
    // mas não forçamos: se o JS já chama init() internamente, não chamamos de novo
    if(typeof init === 'function' && !window.__crmInitCalled){
      window.__crmInitCalled = true;
      init();
    }

  } catch(e){
    console.error('[Serf CRM]', e);
    $id('crm-loading').style.display = 'flex';
    showError(e.message, diags);
  }
}

window.addEventListener('load', carregarCRM);
</script>
</body>
</html>
