<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serf Tecnologia CRM</title>
<link rel="icon" type="image/png" sizes="256x256" href="logo_icon.png">
<!-- CSS carregado via Supabase Edge Functions -->
<link rel="stylesheet" href="https://kcgdhzlrrflyzluzlskf.supabase.co/functions/v1/crm-css">
<!-- Supabase JS SDK (necessário antes do crm-js) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div id="crm-loading" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0C447C;color:#fff;font-family:sans-serif;font-size:14px;flex-direction:column;gap:12px">
  <img src="logo_serf.png" alt="Serf" style="max-width:180px;opacity:.9">
  <div style="opacity:.7">Carregando CRM...</div>
</div>
<!-- HTML do app carregado dinamicamente -->
<script>
(async function() {
  const BASE = 'https://kcgdhzlrrflyzluzlskf.supabase.co/functions/v1';
  try {
    // Carrega o HTML body
    const htmlRes = await fetch(BASE + '/crm-html');
    if (!htmlRes.ok) throw new Error('Falha ao carregar interface');
    const html = await htmlRes.text();
    // Injeta o HTML no body (substitui loading)
    document.getElementById('crm-loading').style.display = 'none';
    const container = document.createElement('div');
    container.innerHTML = html;
    while (container.firstChild) document.body.appendChild(container.firstChild);
    // Carrega o JS principal (supabase SDK já está disponível via <script> no <head>)
    const script = document.createElement('script');
    script.src = BASE + '/crm-js';
    script.async = false;
    document.body.appendChild(script);
  } catch(e) {
    document.getElementById('crm-loading').innerHTML = '<div style="color:#fff;text-align:center"><div style="font-size:24px;margin-bottom:8px">⚠️</div><div>Erro ao carregar o CRM</div><div style="font-size:12px;opacity:.7;margin-top:4px">' + e.message + '</div></div>';
  }
})();
</script>
</body>
</html>
